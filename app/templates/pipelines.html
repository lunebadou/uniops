{% extends "base.html" %}

{% block title %}Pipelines — UniOps{% endblock %}

{% block content %}
    <div class="page-header">
        <div>
            <h1>Pipelines de déploiement</h1>
            <p class="page-subtitle">
                Historique et déclenchement des pipelines CI/CD gérés par UniOps.
            </p>
        </div>
        <button class="btn-primary" onclick="document.getElementById('new-pipeline-modal').style.display='flex'">
            <span>+ Nouveau déploiement</span>
        </button>
    </div>

    <div id="pipelines-list"
         hx-get="/fragments/pipelines"
         hx-trigger="load, every 5s"
         hx-swap="innerHTML">
        {% include "_pipelines_fragment.html" %}
    </div>

    <!-- Modal "Nouveau déploiement" -->
    <div id="new-pipeline-modal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h2>Nouveau déploiement</h2>
                <button class="modal-close" onclick="document.getElementById('new-pipeline-modal').style.display='none'">×</button>
            </div>
            <form hx-post="/pipelines/trigger"
                  hx-target="#pipelines-list"
                  hx-swap="innerHTML"
                  hx-on::after-request="document.getElementById('new-pipeline-modal').style.display='none'; this.reset()">
                <div class="form-group">
                    <label>Application</label>
                    <input type="text" name="application_name" value="supply-chain-app" required>
                </div>
                <div class="form-group">
                    <label>Repo Git</label>
                    <input type="text" name="git_repo" value="lunebadou/supply-chain-app" required>
                    <span class="form-hint">Format : owner/repo</span>
                </div>
                <div class="form-group">
                    <label>Branche</label>
                    <input type="text" name="git_branch" value="main" required>
                </div>
                <div class="form-group">
                    <label>Environnement cible</label>
                    <select name="environment" required>
                        <option value="recette">Recette (auto-déploiement si IA approuve)</option>
                        <option value="production">Production (validation manuelle requise)</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="document.getElementById('new-pipeline-modal').style.display='none'">Annuler</button>
                    <button type="submit" class="btn-primary">Lancer le pipeline</button>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
