<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}UniOps{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <header class="topbar">
        <div class="brand">
            <span class="logo">⬢</span>
            <span class="brand-name">UniOps</span>
        </div>
        <nav class="nav">
            <a href="/">Dashboard</a>
            <a href="/applications">Applications</a>
            <a href="/monitoring">Monitoring</a>
        </nav>
        <div class="user-zone">
            <span class="user-badge">admin</span>
        </div>
    </header>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        UniOps — PFA Master Expert IT — 2025/2026
    </footer>

</body>
</html>
